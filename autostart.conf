# ========================
# Setup
# ========================
exec-once = xsettingsd
exec-once = hyprpm reload
exec-once = waybar
# ========================
# Workspace 1 layout
# ========================
workspace = 1, layout:dwindle
# ========================
# Autostart on workspace 1
# ========================
exec-once = [workspace 1 silent] kitty --title pipes.sh -e pipes.sh -t 0.2
#exec-once = [workspace 1 silent] kitty --title clock -e tty-clock -c -C 5 -f "%H:%M:%s" 
exec-once = [workspace 1 silent] kitty --title btop -e btop
#exec-once = [workspace 1 silent] sh -c "sleep 2; kitty --title cava -e cava"
exec-once = [workspace 1 silent] sh -c "sleep 2; kitty --title unimatrix -e unimatrix -s 95"
#=======================
# Spotify on workspace 3
# =====================
#exec-once = sh -c "sleep 5; hyprctl dispatch workspace 2 :spotify"
# ========================
# Others
# ========================
exec-once = swaync
exec-once = clipse -listen
exec-once = ~/.config/hypr/scripts/restore-wallpaper.sh
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Numix-Circle'
exec-once = fcitx5 -d --replace
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GTK_THEME
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprsunset
exec-once = hypridle
exec-once = systemctl --user restart nwg-dock.service
exec-once = systemctl --user restart feishin-rpc.service
exec-once = systemctl --user restart swww-daemon.service
exec-once = systemctl --user restart hyprshell-quiet.service
exec-once = swww-daemon
exec-once = swayosd-server
